# Example configuration to detect cheap fares and possible mistake fares
# departing from Santiago (SCL) and Buenos Aires (AEP).
#
# Currency: CLP. Google Flights usually returns prices in CLP even when
# another currency is requested, so this is the realistic configuration.
# For USD, edit this and verify that the provider respects the currency.
#
# Window: 7 to 60 days. The first run shows real offers. Raise it to
# 120-180 once you have several weeks of history.

[scanner]
provider = "google_flights_structured"
providers = ["google_flights_structured"]
database_path = "data/faresnipe.sqlite3"
currency = "CLP"
days_ahead_start = 7
days_ahead_end = 60
stay_lengths = [4, 7, 10, 14]
adults = 1
max_results_per_search = 8
request_delay_seconds = 0.2
scan_interval_minutes = 30
scan_jitter_seconds = 60

[detection]
# Alert when the current price drops at least 35% against the comparable
# historical median (same month, same stay, similar purchase window).
discount_ratio = 0.35
# Possible mistake fare filter: drops 55% or more against the median, or
# below the mistake_fare_below threshold configured per route.
mistake_fare_ratio = 0.55
min_history_quotes = 4
history_days = 180

[notifications]
console = true
webhook_url = ""
telegram_bot_token = ""
telegram_chat_id = ""

# Regional routes
[[routes]]
origin = "SCL"
destination = "EZE"
enabled = true
max_price = 120000
mistake_fare_below = 70000

