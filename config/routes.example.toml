# Configuracion de ejemplo para detectar pasajes baratos y posibles errores
# de precio saliendo desde Santiago (SCL) y Buenos Aires (AEP).
#
# Moneda: CLP. Google Flights suele devolver precios en CLP aunque se pida
# otra moneda, asi que esta es la configuracion realista. Si queres USD,
# editalo y revisa que el proveedor respete la moneda.
#
# Ventana: 7 a 60 dias. La primera corrida muestra oferta real. Subi a
# 120-180 cuando ya tengas varias semanas de historial.

[scanner]
provider = "google_flights_structured"
providers = ["google_flights_structured"]
database_path = "data/faresnipe.sqlite3"
currency = "CLP"
days_ahead_start = 7
days_ahead_end = 60
stay_lengths = [4, 7, 10, 14]
adults = 1
max_results_per_search = 8
request_delay_seconds = 0.2
scan_interval_minutes = 30
scan_jitter_seconds = 60

[detection]
# Alerta si el precio actual cae al menos 35% contra la mediana historica
# comparable (mismo mes, misma estadia, ventana de compra similar).
discount_ratio = 0.35
# Filtro de posible error de precio: cae 55% o mas contra la mediana, o
# por debajo de mistake_fare_below configurado por ruta.
mistake_fare_ratio = 0.55
min_history_quotes = 4
history_days = 180

[notifications]
console = true
webhook_url = ""
telegram_bot_token = ""
telegram_chat_id = ""

# Regionales
[[routes]]
origin = "SCL"
destination = "EZE"
enabled = true
max_price = 120000
mistake_fare_below = 70000

