# Configuracion de ejemplo para detectar pasajes baratos y posibles errores
# de precio usando origenes y destinos curados.

[scanner]
provider = "google_flights_structured"
database_path = "data/faresnipe.sqlite3"
currency = "USD"
days_ahead_start = 7
days_ahead_end = 30
stay_lengths = [7, 14]
adults = 1
max_results_per_search = 8
request_delay_seconds = 0.2
scan_interval_minutes = 30
scan_jitter_seconds = 60

[detection]
discount_ratio = 0.35
mistake_fare_ratio = 0.55
min_history_quotes = 4
history_days = 180

[notifications]
console = true
webhook_url = ""
telegram_bot_token = ""
telegram_chat_id = ""

# Definicion de origenes
[[origins]]
code = "AEP"
name = "Buenos Aires"
destinations = ["PMC", "BBA", "RGL", "SCL"]
default_max_price = 180
default_mistake_fare_below = 90
enabled = true

[[origins]]
code = "SCL"
name = "Santiago"
destinations = [
  # Argentina
  "EZE", "AEP", "MDZ", "COR",
  # Brasil
  "GRU", "GIG",
  # Uruguay
  "MVD",
  # Paraguay
  "ASU",
  # Peru
  "LIM",
  # Colombia / Ecuador
  "BOG", "UIO", "GYE",
  # Mexico / Caribe / Centroamerica
  "MEX", "CUN", "PTY",
  # USA / Canada
  "MIA", "JFK", "ATL", "DFW", "YYZ",
  # Europa
  "MAD", "CDG",
  # Chile domestico
  "CCP", "IQQ", "ANF", "CJC", "PMC", "ZCO", "LSC", "ARI", "IPC",
]
default_max_price = 450
default_mistake_fare_below = 225
enabled = true

# Overrides por ruta (opcional). Se aplican despues del default del origen.
[[route_thresholds]]
origin = "AEP"
destination = "SCL"
max_price = 170
mistake_fare_below = 115

