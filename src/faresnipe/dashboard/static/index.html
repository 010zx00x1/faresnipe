<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>faresnipe</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="site-header">
    <div class="topbar">
      <div class="brand">
        <h1>faresnipe</h1>
        <p id="statusSubtitle" class="status-subtitle">Loading watcher status...</p>
      </div>
      <div class="header-actions">
        <button id="scanBtn" class="secondary" type="button">Scan now</button>
        <button id="refreshBtn" type="button">Refresh</button>
      </div>
    </div>
  </header>

  <main>
    <section id="originSummary" class="origin-grid" aria-label="Summary by origin"></section>

    <section id="dealBanner" class="deal-banner" aria-label="Deal of the day"></section>

    <section class="panel compare-panel">
      <div class="section-head compare-head">
        <div>
          <h2>Compare origins</h2>
          <p>Choose a destination and dates to see where it's cheaper to depart from.</p>
        </div>
        <form id="compareForm" class="compare-form">
          <label>
            Destination
            <input id="compareDestination" type="text" maxlength="3" value="EZE" autocomplete="off">
          </label>
          <label>
            Departure
            <input id="compareDeparture" type="date">
          </label>
          <label>
            Return
            <input id="compareReturn" type="date">
          </label>
          <button type="submit">Compare</button>
        </form>
      </div>
      <div id="compareResults" class="compare-results"></div>
    </section>

    <section class="panel low-prices-panel">
      <div class="section-head">
        <div>
          <h2>Lowest prices seen</h2>
          <p>Sorted by price</p>
        </div>
      </div>
      <div id="lowestPrices" class="price-list"></div>
    </section>

    <section class="panel routes-panel">
      <button id="routesToggle" class="accordion-toggle" type="button" aria-expanded="false">
        View the routes watched by the bot
      </button>
      <div id="routesTableWrap" class="routes-table-wrap route-groups" hidden>
        <div id="routeGroups"></div>
      </div>
    </section>

    <div id="pageStatus" class="page-status" role="status"></div>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
